<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Notera · Auto-Tester Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'class', theme: { extend: {
    colors: {
      ink: { 900:'#0a0e14', 850:'#0d1219', 800:'#111827', 750:'#151d2b', 700:'#1c2636', 600:'#26344a' },
      line: '#22304a', phos: { DEFAULT:'#3ddc97', dim:'#1f7a5a' }, danger:'#ff5c7c', warn:'#ffb454', good:'#3ddc97', info:'#4aa3ff'
    },
    fontFamily: { mono: ['ui-monospace','SFMono-Regular','Menlo','monospace'], sans: ['Inter','ui-sans-serif','system-ui'] }
  } } };
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  html,body{height:100%} body{background:#0a0e14;color:#c9d4e3}
  *{scrollbar-width:thin;scrollbar-color:#26344a transparent}
  *::-webkit-scrollbar{width:9px;height:9px}*::-webkit-scrollbar-thumb{background:#26344a;border-radius:6px}
  .glow{box-shadow:0 0 0 1px #22304a, 0 8px 30px -12px rgba(61,220,151,.15)}
  .logpane{font-family:ui-monospace,monospace;font-size:12.5px;line-height:1.55}
  .md h1{font-size:1.4rem;font-weight:700;margin:.5em 0 .3em;color:#eaf1fb}
  .md h2{font-size:1.1rem;font-weight:700;margin:.9em 0 .3em;color:#dbe6f5;border-bottom:1px solid #22304a;padding-bottom:.2em}
  .md h3{font-size:.98rem;font-weight:600;margin:.7em 0 .2em;color:#cdd9ea}
  .md p{margin:.4em 0}.md ul,.md ol{margin:.3em 0 .3em 1.2em}.md ul{list-style:disc}.md ol{list-style:decimal}.md li{margin:.15em 0}
  .md code{background:#151d2b;padding:.1em .35em;border-radius:4px;font-family:ui-monospace,monospace;font-size:.85em;color:#9ff0cf}
  .md pre{background:#0d1219;border:1px solid #22304a;border-radius:8px;padding:.8em;overflow:auto;margin:.5em 0}
  .md pre code{background:none;padding:0}
  .md table{border-collapse:collapse;margin:.6em 0;width:100%;font-size:.85rem}
  .md th,.md td{border:1px solid #22304a;padding:.35em .6em;text-align:left;vertical-align:top}.md th{background:#151d2b}
  .md strong{color:#eaf1fb}.md em{color:#9fb0c6}.md blockquote{border-left:3px solid #1f7a5a;padding-left:.8em;color:#9fb0c6;margin:.4em 0}
  .md hr{border:0;border-top:1px solid #22304a;margin:.8em 0}
  .diff-add{background:rgba(61,220,151,.12);color:#a9f0d1}.diff-del{background:rgba(255,92,124,.12);color:#ffb3c4}
  .fade{animation:f .25s ease}@keyframes f{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback,useMemo} = React;
const _mdi = (typeof window!=='undefined') && (window.markdownit || window.markdownIt);
const MD = _mdi ? _mdi({ html:false, linkify:true, breaks:true, typographer:true })
  : { render:(t)=>'<pre style="white-space:pre-wrap">'+String(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))+'</pre>' };
const BLOCKERS = ['patient2','patient5'];
const isBlocker = (f)=> BLOCKERS.includes(String(f||'').toLowerCase());
const cls = (...a)=>a.filter(Boolean).join(' ');
const stripAnsi = (s)=> s.replace(/\x1b\[[0-9;]*m/g,'');
async function jget(u){ const r=await fetch(u); if(r.status===401) throw {unauth:true}; return r.json(); }
async function jpost(u,b){ const r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})}); if(r.status===401&&u!=='/api/login') throw {unauth:true}; return r.json(); }
async function jput(u,b){ const r=await fetch(u,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})}); if(r.status===401) throw {unauth:true}; return r.json(); }
const fmtPct = (v)=> v==null?'—':(v*100).toFixed(1)+'%';
const fmtNum = (v,d=3)=> v==null?'—':Number(v).toFixed(d);
const shortId = (id)=> id.replace(/^run_/,'').replace('_',' ');
const numOf = (name)=>{ const m=String(name).match(/(\d+)/); return m?Number(m[1]):null; };

// split an eval .md into its named sections (Generated / Raw / Gold + head)
function splitNoteMd(md){
  const lines=(md||'').split('\n'); const secs=[]; let cur={title:'_head',body:[]};
  for(const ln of lines){ const m=ln.match(/──\s*(.+?)\s*──/); if(m){ secs.push(cur); cur={title:m[1],body:[]}; } else cur.body.push(ln); }
  secs.push(cur);
  const find=(rx)=>{ const s=secs.find(x=>rx.test(x.title)); return s?s.body.join('\n').trim():''; };
  return { head:secs[0].body.join('\n').trim(), generated:find(/generated/i), raw:find(/raw pipeline|embedded/i), gold:find(/gold/i) };
}

const DEF_TH = { section_coverage:[0.8,0.6], similarity_to_gold:[0.4,0.28], story_flow:[0.85,0.65], omission_rate:[0.45,0.6] };
function loadTh(){ try{return {...DEF_TH,...JSON.parse(localStorage.getItem('notera_th')||'{}')}}catch{return DEF_TH} }
function metricColor(key,v,th){ if(v==null) return 'text-slate-500'; const t=th[key]; if(!t) return 'text-slate-200';
  const inv = key==='omission_rate'; const [g,a]=t;
  if(inv){ if(v<=g) return 'text-good'; if(v<=a) return 'text-warn'; return 'text-danger'; }
  if(v>=g) return 'text-good'; if(v>=a) return 'text-warn'; return 'text-danger'; }

function Pill({status}){
  const map={idle:['Idle','bg-ink-700 text-slate-300'],running:['Running','bg-info/20 text-info animate-pulse'],passed:['Passed','bg-good/15 text-good'],failed:['Failed','bg-danger/15 text-danger'],killed:['Killed','bg-warn/15 text-warn'],error:['Error','bg-danger/15 text-danger'],interrupted:['Interrupted','bg-warn/15 text-warn']};
  const [t,c]=map[status]||map.idle; return <span className={cls('px-2.5 py-1 rounded-full text-xs font-semibold',c)}>{t}</span>;
}
function Badge({passed}){ return passed===null? <span className="text-slate-500 text-xs">—</span> :
  <span className={cls('px-2 py-.5 rounded text-[11px] font-bold', passed?'bg-good/15 text-good':'bg-danger/15 text-danger')}>{passed?'PASS':'FAIL'}</span>; }
function Md({text}){ return <div className="md" dangerouslySetInnerHTML={{__html:MD.render(text||'')}}/>; }

function Login({onOk}){
  const [pw,setPw]=useState(''); const [err,setErr]=useState('');
  const go=async()=>{ const r=await jpost('/api/login',{password:pw}); if(r.ok) onOk(); else setErr('Wrong password'); };
  return <div className="h-screen flex items-center justify-center">
    <div className="w-80 bg-ink-800 glow rounded-2xl p-7">
      <div className="text-phos font-mono text-sm mb-1">notera://</div>
      <h1 className="text-xl font-bold text-slate-100 mb-1">Auto-Tester Admin</h1>
      <p className="text-slate-400 text-sm mb-5">Internal regression console.</p>
      <input type="password" value={pw} autoFocus onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}
        placeholder="password" className="w-full bg-ink-900 border border-line rounded-lg px-3 py-2 text-sm outline-none focus:border-phos-dim"/>
      {err&&<div className="text-danger text-xs mt-2">{err}</div>}
      <button onClick={go} className="w-full mt-4 bg-phos text-ink-900 font-semibold rounded-lg py-2 text-sm hover:brightness-110">Enter</button>
    </div></div>;
}

const NAV=[['overview','Overview','▦'],['run','Run','▶'],['results','Results','☰'],['metrics','Metrics','📈'],['prompts','Prompts','✎'],['judge','Gates & Judge','⚖']];
function Sidebar({tab,setTab,onLogout,collapsed}){
  return <div className={cls('shrink-0 bg-ink-850 border-r border-line flex flex-col transition-all', collapsed?'w-14':'w-52')}>
    <div className="px-4 py-4 border-b border-line overflow-hidden whitespace-nowrap">
      <div className="text-phos font-mono text-[13px]">notera://</div>
      {!collapsed&&<div className="text-slate-200 font-semibold text-sm">Auto-Tester</div>}
    </div>
    <nav className="flex-1 p-2 space-y-1">
      {NAV.map(([id,label,ic])=>
        <button key={id} onClick={()=>setTab(id)} title={label} className={cls('w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm transition',
          tab===id?'bg-ink-700 text-slate-100 glow':'text-slate-400 hover:bg-ink-800 hover:text-slate-200')}>
          <span className="w-4 text-center opacity-80">{ic}</span>{!collapsed&&label}</button>)}
    </nav>
    <button onClick={onLogout} className="m-2 px-3 py-2 text-xs text-slate-500 hover:text-slate-300 text-left">{collapsed?'⎋':'Sign out'}</button>
  </div>;
}

// ── Run tab (preset + range) ──────────────────────────────────
function RunTab({global}){
  const [presets,setPresets]=useState([]); const [mode,setMode]=useState('all');
  const [sel,setSel]=useState(''); const [from,setFrom]=useState(1); const [to,setTo]=useState(5);
  const [runId,setRunId]=useState(null); const [status,setStatus]=useState('idle');
  const [lines,setLines]=useState([]); const [filter,setFilter]=useState('');
  const [history,setHistory]=useState([]); const esRef=useRef(null); const paneRef=useRef(null);
  const fixtures=presets.filter(p=>p.id!=='all').map(p=>p.id);
  const numOf=(f)=>{const m=String(f).match(/(\d+)/);return m?+m[1]:null;};
  const lo=Math.min(from,to), hi=Math.max(from,to);
  const rangeSel=fixtures.filter(f=>{const n=numOf(f);return n!=null&&n>=lo&&n<=hi;});
  const loadHist=useCallback(()=>jget('/api/runs').then(setHistory).catch(()=>{}),[]);
  useEffect(()=>{ jget('/api/scripts').then(d=>{setPresets(d.presets||[]); const f=(d.presets||[]).find(x=>x.id!=='all'); if(f)setSel(f.id);}).catch(()=>{}); loadHist(); },[]);
  useEffect(()=>{ const el=paneRef.current; if(el) el.scrollTop=el.scrollHeight; },[lines]);
  const attach=(id)=>{ setLines([]); if(esRef.current) esRef.current.close();
    const es=new EventSource('/api/runs/'+id+'/stream'); esRef.current=es;
    es.onmessage=(e)=>{ const d=JSON.parse(e.data);
      if(d.type==='line') setLines(L=>[...L,{stream:d.stream,line:stripAnsi(d.line)}]);
      else if(d.type==='status'){ setStatus(d.status); global.setStatus(d.status); if(d.status!=='running'){ es.close(); loadHist(); } } };
    es.onerror=()=>{ es.close(); };
  };
  const chosen=()=> mode==='all'?[] : mode==='one'?(sel?[sel]:[]) : rangeSel;
  const start=async()=>{ const fx=chosen(); const r=await jpost('/api/runs',{fixtures:fx});
    setRunId(r.runId); setStatus('running'); global.setStatus('running'); attach(r.runId); loadHist(); };
  const stop=async()=>{ if(runId){ await jpost('/api/runs/'+runId+'/kill',{}); } };
  const openHist=(h)=>{ setRunId(h.id); setStatus(h.status); attach(h.id); };
  const download=()=>{ const blob=new Blob([lines.map(l=>l.line).join('\n')],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=(runId||'run')+'.log'; a.click(); };
  const shown=lines.filter(l=>!filter||l.line.toLowerCase().includes(filter.toLowerCase()));
  const Mbtn=(id,label)=><button onClick={()=>setMode(id)} className={cls('px-3 py-1.5 rounded-lg text-sm border',mode===id?'border-phos-dim bg-ink-700 text-slate-100':'border-line bg-ink-800 text-slate-400 hover:text-slate-200')}>{label}</button>;
  const willRun= mode==='all'?fixtures.length:(mode==='one'?(sel?1:0):rangeSel.length);
  return <div className="p-6 fade">
    <div className="flex items-center gap-2 mb-3">{Mbtn('all','All')}{Mbtn('one','Single')}{Mbtn('range','Range')}</div>
    <div className="flex items-center gap-3 mb-4 flex-wrap">
      {mode==='one'&&<select value={sel} onChange={e=>setSel(e.target.value)} className="bg-ink-800 border border-line rounded-lg px-3 py-2 text-sm outline-none focus:border-phos-dim">
        {fixtures.map(f=><option key={f} value={f}>{f}</option>)}</select>}
      {mode==='range'&&<div className="flex items-center gap-2 text-sm text-slate-400">
        <span>Patient</span>
        <input type="number" min="1" value={from} onChange={e=>setFrom(+e.target.value)} className="w-16 bg-ink-800 border border-line rounded-lg px-2 py-2 outline-none focus:border-phos-dim"/>
        <span>to</span>
        <input type="number" min="1" value={to} onChange={e=>setTo(+e.target.value)} className="w-16 bg-ink-800 border border-line rounded-lg px-2 py-2 outline-none focus:border-phos-dim"/>
      </div>}
      {status!=='running'
        ? <button onClick={start} disabled={willRun===0} className={cls('font-semibold px-4 py-2 rounded-lg text-sm',willRun===0?'bg-ink-700 text-slate-500':'bg-phos text-ink-900 hover:brightness-110')}>▶ Run {willRun>0?`(${willRun})`:''}</button>
        : <button onClick={stop} className="bg-danger/90 text-white font-semibold px-4 py-2 rounded-lg text-sm">■ Stop</button>}
      <Pill status={status}/>
      <div className="flex-1"/>
      <input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="filter logs…" className="bg-ink-800 border border-line rounded-lg px-3 py-2 text-sm w-48 outline-none focus:border-phos-dim"/>
      <button onClick={download} className="text-slate-400 hover:text-slate-200 text-sm border border-line rounded-lg px-3 py-2">⭳ Log</button>
    </div>
    {mode==='range'&&<div className="mb-3 text-xs text-slate-500">Will run: {rangeSel.length? rangeSel.join(', ') : <span className="text-warn">no fixtures match Patient {lo}–{hi}</span>}</div>}
    <div ref={paneRef} className="logpane bg-ink-900 border border-line rounded-xl h-[50vh] overflow-auto p-3">
      {shown.length===0 && <div className="text-slate-600 text-sm">No output yet. Choose fixtures and hit Run — stdout streams here live.</div>}
      {shown.map((l,i)=><div key={i} className={cls('whitespace-pre-wrap', l.stream==='err'?'text-danger':'text-slate-300')}>{l.line}</div>)}
    </div>
    <div className="mt-4">
      <div className="text-xs uppercase tracking-wide text-slate-500 mb-2">Recent runs</div>
      <div className="flex gap-2 flex-wrap">
        {history.slice(0,8).map(h=>
          <button key={h.id} onClick={()=>openHist(h)} className={cls('flex items-center gap-2 px-3 py-2 rounded-lg border text-xs',
            runId===h.id?'border-phos-dim bg-ink-700':'border-line bg-ink-800 hover:bg-ink-700')}>
            <Pill status={h.status}/><span className="font-mono text-slate-400">{(h.command||'').replace('node eval/run_eval.mjs','eval').trim()||'eval'}</span>
          </button>)}
        {history.length===0&&<span className="text-slate-600 text-sm">No runs yet.</span>}
      </div>
    </div>
  </div>;
}

// ── Results tab (collapsible selector + 2-pane Generated | Gold) ──
function NotePane({title,tone,md,raw,onClose,closable}){
  return <div className="flex-1 min-w-0 flex flex-col border border-line rounded-xl bg-ink-850 overflow-hidden">
    <div className="flex items-center gap-2 px-3 py-2 border-b border-line">
      <span className={cls('w-2 h-2 rounded-full',tone==='gold'?'bg-warn':'bg-phos')}/>
      <span className="text-sm font-semibold text-slate-200">{title}</span>
      <div className="flex-1"/>
      {closable&&<button onClick={onClose} title="close pane" className="text-slate-500 hover:text-slate-200 text-sm px-1">✕</button>}
    </div>
    <div className="flex-1 overflow-auto p-4">
      {raw ? <pre className="logpane whitespace-pre-wrap text-slate-300">{md}</pre>
           : md.trim() ? <div className="md" dangerouslySetInnerHTML={{__html:MD.render(md)}}/>
                       : <div className="text-slate-600 text-sm">(empty)</div>}
    </div>
  </div>;
}
function ResultsTab({setTab,target,clearTarget}){
  const [runs,setRuns]=useState([]); const [dir,setDir]=useState(''); const [files,setFiles]=useState([]);
  const [file,setFile]=useState(''); const [content,setContent]=useState(''); const [raw,setRaw]=useState(false);
  const [diffB,setDiffB]=useState(''); const [diffMode,setDiffMode]=useState(false); const [diffData,setDiffData]=useState(null);
  const [sideOpen,setSideOpen]=useState(true); const [showGen,setShowGen]=useState(true); const [showGold,setShowGold]=useState(true);
  const [wantFile,setWantFile]=useState('');
  useEffect(()=>{ jget('/api/results/runs').then(setRuns).catch(()=>{}); },[]);
  // Choose which run to show. An explicit Metrics jump (target) always wins;
  // otherwise default to the newest run once the list loads. deps include `runs`
  // so there is no stale-closure race that could snap back to the first run.
  useEffect(()=>{
    if(target&&target.dir){ setDiffMode(false); setSideOpen(true); setWantFile(target.file||''); setDir(target.dir); if(target.file) setFile(target.file); clearTarget&&clearTarget(); }
    else if(!dir&&runs[0]){ setDir(runs[0].dir); }
  },[target,runs]);
  useEffect(()=>{ if(dir) jget('/api/results/'+dir+'/files').then(f=>{ setFiles(f); const pick=(wantFile&&f.find(x=>x.file===wantFile))?wantFile:(f[0]?f[0].file:''); if(pick)setFile(pick); if(wantFile)setWantFile(''); }).catch(()=>{}); },[dir]);
  useEffect(()=>{ if(dir&&file&&!diffMode) jget('/api/results/file?dir='+dir+'&name='+encodeURIComponent(file)).then(d=>setContent(d.content||'')).catch(()=>{}); },[dir,file,diffMode]);
  useEffect(()=>{ if(diffMode&&dir&&diffB&&file) jget(`/api/results/diff?a=${diffB}&b=${dir}&name=${encodeURIComponent(file)}`).then(setDiffData).catch(()=>{}); },[diffMode,dir,diffB,file]);
  const parsed=useMemo(()=>splitNoteMd(content),[content]);
  const diffLines=useMemo(()=>diffData?computeDiff(diffData.a,diffData.b):[],[diffData]);
  const copy=()=>navigator.clipboard.writeText(content);
  const genOpen=showGen||!showGold; const goldOpen=showGold||!showGen;
  const tbtn=(on,set,label)=><button onClick={()=>set(!on)} className={cls('text-xs border rounded px-2 py-1',on?'border-phos-dim text-slate-200':'border-line text-slate-500 hover:text-slate-300')}>{label}</button>;
  return <div className="p-6 fade flex gap-4 h-[calc(100vh-56px)]">
    {sideOpen && <div className="w-60 shrink-0 flex flex-col gap-3">
      <div className="flex items-center justify-between">
        <span className="text-xs uppercase tracking-wide text-slate-500">Run</span>
        <button onClick={()=>setSideOpen(false)} title="collapse sidebar" className="text-slate-500 hover:text-slate-200 text-xs">◀ hide</button>
      </div>
      <select value={dir} onChange={e=>setDir(e.target.value)} className="w-full bg-ink-800 border border-line rounded-lg px-2 py-2 text-sm outline-none">
        {runs.map(r=><option key={r.dir} value={r.dir}>{shortId(r.dir)}</option>)}</select>
      <label className="flex items-center gap-2 text-sm text-slate-400">
        <input type="checkbox" checked={diffMode} onChange={e=>{setDiffMode(e.target.checked); if(e.target.checked)setDiffB(runs.find(r=>r.dir!==dir)?.dir||'');}}/> Diff vs another run</label>
      {diffMode&&<select value={diffB} onChange={e=>setDiffB(e.target.value)} className="w-full bg-ink-800 border border-line rounded-lg px-2 py-2 text-sm">
        {runs.filter(r=>r.dir!==dir).map(r=><option key={r.dir} value={r.dir}>{shortId(r.dir)}</option>)}</select>}
      <div className="text-xs uppercase tracking-wide text-slate-500 mt-1">Fixtures</div>
      <div className="flex-1 overflow-auto space-y-1 pr-1">
        {files.map(f=>
          <button key={f.file} onClick={()=>setFile(f.file)} className={cls('w-full flex items-center justify-between gap-2 px-2.5 py-2 rounded-lg text-sm',
            file===f.file?'bg-ink-700 text-slate-100':'text-slate-400 hover:bg-ink-800')}>
            <span className="truncate">{isBlocker(f.fixture)&&<span className="text-warn mr-1" title="release blocker">★</span>}{f.fixture}</span>
            <Badge passed={f.passed}/></button>)}
      </div>
    </div>}
    <div className="flex-1 flex flex-col min-w-0">
      <div className="flex items-center gap-2 mb-3 flex-wrap">
        {!sideOpen&&<button onClick={()=>setSideOpen(true)} className="text-xs border border-line rounded px-2 py-1 text-slate-400 hover:text-slate-200">▶ files</button>}
        <button onClick={()=>setTab&&setTab('prompts')} title="edit the pipeline prompts" className="text-xs bg-ink-700 text-slate-200 rounded px-2.5 py-1 hover:brightness-110">✎ Prompts →</button>
        <span className="font-mono text-sm text-slate-300 truncate">{file}</span>
        {isBlocker(file.replace(/\.md$/,''))&&<span className="text-warn text-xs">★ blocker</span>}
        <div className="flex-1"/>
        {!diffMode&&<>
          {tbtn(showGen,setShowGen,'Notera')}
          {tbtn(showGold,setShowGold,'Heidi')}
          {tbtn(raw,setRaw,'Raw')}
          <button onClick={copy} className="text-xs border border-line rounded px-2 py-1 text-slate-400 hover:text-slate-200">Copy</button>
        </>}
        {diffMode&&<span className="text-xs text-slate-500">{shortId(diffB)} → {shortId(dir)}</span>}
      </div>
      {diffMode
        ? <div className="flex-1 overflow-auto bg-ink-850 border border-line rounded-xl p-4 logpane">{diffLines.map((d,i)=><div key={i} className={cls('whitespace-pre-wrap px-1', d.t==='+'&&'diff-add', d.t==='-'&&'diff-del')}>{d.t} {d.line}</div>)}</div>
        : <div className="flex-1 flex gap-4 min-h-0">
            {genOpen&&<NotePane title="Notera — generated" tone="gen" md={parsed.generated||content} raw={raw} closable={goldOpen} onClose={()=>setShowGen(false)}/>}
            {goldOpen&&<NotePane title="Heidi — gold" tone="gold" md={parsed.gold} raw={raw} closable={genOpen} onClose={()=>setShowGold(false)}/>}
          </div>}
    </div>
  </div>;
}
function computeDiff(a,b){ const A=(a||'').split('\n'),B=(b||'').split('\n'); const n=A.length,m=B.length;
  const dp=Array.from({length:n+1},()=>new Array(m+1).fill(0));
  for(let i=n-1;i>=0;i--)for(let j=m-1;j>=0;j--)dp[i][j]=A[i]===B[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);
  const out=[]; let i=0,j=0;
  while(i<n&&j<m){ if(A[i]===B[j]){out.push({t:' ',line:A[i]});i++;j++;} else if(dp[i+1][j]>=dp[i][j+1]){out.push({t:'-',line:A[i]});i++;} else {out.push({t:'+',line:B[j]});j++;} }
  while(i<n)out.push({t:'-',line:A[i++]}); while(j<m)out.push({t:'+',line:B[j++]});
  return out.filter(d=>d.t!==' '||d.line.trim()); }

        {(logs.filter(r=>r.fixtures&&r.fixtures.length).length===0)
          ? <div className="text-slate-600">No output from this agent found in recent run logs. Run the tester from the Run tab, then reopen Logs.</div>
          : logs.filter(r=>r.fixtures&&r.fixtures.length).map(r=><div key={r.id} className="mb-2 border border-line rounded-lg overflow-hidden">
              <button onClick={()=>setOpenRun(openRun===r.id?'':r.id)} className="w-full flex items-center gap-2 px-2 py-1.5 text-left hover:bg-ink-800">
                <Pill status={r.status}/>
                <span className="font-mono text-slate-300">{shortId(r.resultDir||r.id)}</span>
                <span className="text-slate-600 truncate flex-1">{(r.command||'').replace('node eval/run_eval.mjs','eval').trim()||'eval'}</span>
                <span className="text-slate-500">{r.fixtures.length} fixture{r.fixtures.length===1?'':'s'} {openRun===r.id?'▾':'▸'}</span>
              </button>
              {openRun===r.id&&<div className="p-2 space-y-2 border-t border-line">
                {r.fixtures.map((fx,i)=><div key={i}>
                  <div className="flex items-center gap-2 mb-1">
                    <span className="text-phos text-[11px] font-mono">{fx.fixture}</span>
                    {isBlocker(fx.fixture)&&<span className="text-warn text-[10px]">★</span>}
                    <button onClick={()=>{setTab&&setTab('results');}} title="open this run in Results" className="text-info text-[10px] hover:underline">open in Results →</button>
                  </div>
                  <pre className="logpane whitespace-pre-wrap text-slate-300 bg-ink-850 rounded p-2">{fx.lines.join('\n')}</pre>
                </div>)}
              </div>}
            </div>)}
      </div>}
      <div className="flex-1 flex flex-col min-h-0 border border-line rounded-xl bg-ink-850 overflow-hidden">
        <div className="px-3 py-2 border-b border-line text-sm font-semibold text-slate-200 flex items-center gap-2">
          <span className={cls('w-2 h-2 rounded-full',dirty?'bg-warn':'bg-phos')}/>Editor
          <span className="text-xs text-slate-500 font-mono">live: v{detail.publishedVersion||'—'}</span>
        </div>
        <textarea value={edit} onChange={e=>setEdit(e.target.value)} readOnly={ro} spellCheck={false}
          className="flex-1 overflow-auto p-4 logpane bg-ink-900 text-slate-200 outline-none resize-none"/>
        <input value={note} onChange={e=>setNote(e.target.value)} placeholder="change note (like a commit message)…"
          className="border-t border-line bg-ink-850 px-3 py-2 text-xs text-slate-300 outline-none"/>
      </div>
      </>}
    </div>
  </div>;
}

function App(){
  const [authed,setAuthed]=useState(null); const [tab,setTab]=useState('overview'); const [status,setStatus]=useState('idle'); const [navOpen,setNavOpen]=useState(true);
  const [resultsTarget,setResultsTarget]=useState(null);
  const openInResults=(dir,file)=>{ setResultsTarget({dir,file:file||'',n:Date.now()}); setTab('results'); };
  useEffect(()=>{ jget('/api/session').then(d=>setAuthed(d.authed)).catch(()=>setAuthed(false)); },[]);
  useEffect(()=>{ const h=(e)=>{ if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault(); setTab('run');} }; window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h); },[]);
  if(authed===null) return <div className="h-screen flex items-center justify-center text-slate-500">…</div>;
  if(!authed) return <Login onOk={()=>setAuthed(true)}/>;
  const logout=async()=>{ await jpost('/api/logout',{}); setAuthed(false); };
  return <div className="flex h-screen">
    <Sidebar tab={tab} setTab={setTab} onLogout={logout} collapsed={!navOpen}/>
    <div className="flex-1 flex flex-col min-w-0">
      <div className="h-14 shrink-0 border-b border-line bg-ink-850 flex items-center gap-3 px-4">
        <button onClick={()=>setNavOpen(o=>!o)} title="toggle sidebar" className="text-slate-400 hover:text-slate-200 w-8 h-8 rounded-lg hover:bg-ink-800">☰</button>
        <div className="text-slate-200 font-semibold capitalize">{NAV.find(n=>n[0]===tab)?.[1]}</div>
        <Pill status={status}/><div className="flex-1"/>
        <span className="text-xs text-slate-500 font-mono">env: local · ⌘K → Run</span>
      </div>
      <div className="flex-1 overflow-auto">
        {tab==='overview'&&<Overview setTab={setTab}/>}
        {tab==='run'&&<RunTab global={{setStatus}}/>}
        {tab==='results'&&<ResultsTab setTab={setTab} target={resultsTarget} clearTarget={()=>setResultsTarget(null)}/>}
        {tab==='metrics'&&<MetricsTab openInResults={openInResults}/>}
        {tab==='prompts'&&<PromptsTab setTab={setTab}/>}
        {tab==='judge'&&<JudgeTab/>}
      </div>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
