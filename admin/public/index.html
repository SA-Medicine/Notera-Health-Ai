<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Notera · Auto-Tester</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // ── Design tokens (refined premium palette · dark) ──────────────────────────
  tailwind.config = { darkMode:'class', theme:{ extend:{
    colors:{
      // surfaces (near-black → raised) + borders
      ink:{ 900:'#0b0d10', 850:'#111418', 800:'#161a20', 750:'#1b2027', 700:'#232a33', 600:'#2c343f' },
      line:'#262d37',
      // brand + semantic (softer, higher-trust)
      phos:{ DEFAULT:'#34d399', dim:'#167c5b' },
      danger:'#fb7185', warn:'#fbbf24', good:'#34d399', info:'#60a5fa'
    },
    fontFamily:{
      sans:['Inter','ui-sans-serif','system-ui','sans-serif'],
      mono:['"JetBrains Mono"','ui-monospace','SFMono-Regular','Menlo','monospace']
    },
    boxShadow:{
      card:'0 1px 2px rgba(0,0,0,.35), 0 1px 1px rgba(0,0,0,.2)',
      pop:'0 16px 40px -12px rgba(0,0,0,.6), 0 0 0 1px rgba(38,45,55,.9)',
      glow:'0 0 0 1px #262d37, 0 14px 44px -18px rgba(52,211,153,.20)'
    },
    borderRadius:{ xl:'14px' }
  }}};
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  html,body{height:100%}
  body{background:#0b0d10;color:#d4dbe6;font-family:'Inter',ui-sans-serif,system-ui;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  ::selection{background:rgba(52,211,153,.25);color:#eafff6}
  *{scrollbar-width:thin;scrollbar-color:#2c343f transparent}
  *::-webkit-scrollbar{width:10px;height:10px}
  *::-webkit-scrollbar-thumb{background:#232a33;border:2px solid transparent;background-clip:padding-box;border-radius:8px}
  *::-webkit-scrollbar-thumb:hover{background:#2c343f;background-clip:padding-box}
  /* accessible focus (WCAG) — keyboard only */
  :focus-visible{outline:2px solid #34d399;outline-offset:2px;border-radius:6px}
  button:focus:not(:focus-visible),a:focus:not(:focus-visible),input:focus:not(:focus-visible),select:focus:not(:focus-visible),textarea:focus:not(:focus-visible){outline:none}
  .glow{box-shadow:0 0 0 1px #262d37, 0 14px 44px -18px rgba(52,211,153,.20)}
  .card{background:#111418;border:1px solid #262d37;border-radius:14px;box-shadow:0 1px 2px rgba(0,0,0,.35)}
  .logpane{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12.5px;line-height:1.6;letter-spacing:-.01em}
  /* skeleton loading */
  .skeleton{position:relative;overflow:hidden;background:#161a20;border-radius:8px}
  .skeleton::after{content:'';position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);animation:shimmer 1.5s infinite}
  @keyframes shimmer{100%{transform:translateX(100%)}}
  /* toasts */
  .toastIn{animation:toastIn .22s cubic-bezier(.2,.8,.2,1)}
  @keyframes toastIn{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  /* markdown (refined) */
  .md h1{font-size:1.35rem;font-weight:700;margin:.5em 0 .35em;color:#f1f5fb;letter-spacing:-.01em}
  .md h2{font-size:1.05rem;font-weight:650;margin:1em 0 .35em;color:#e2e9f3;border-bottom:1px solid #232a33;padding-bottom:.3em}
  .md h3{font-size:.95rem;font-weight:600;margin:.75em 0 .25em;color:#cdd9ea}
  .md p{margin:.45em 0;line-height:1.65}.md ul,.md ol{margin:.35em 0 .35em 1.2em}.md ul{list-style:disc}.md ol{list-style:decimal}.md li{margin:.2em 0;line-height:1.6}
  .md code{background:#1b2027;padding:.12em .4em;border-radius:5px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:.85em;color:#8fe9c4}
  .md pre{background:#0d1013;border:1px solid #232a33;border-radius:10px;padding:.9em;overflow:auto;margin:.6em 0}
  .md pre code{background:none;padding:0}
  .md table{border-collapse:collapse;margin:.6em 0;width:100%;font-size:.85rem}
  .md th,.md td{border:1px solid #232a33;padding:.4em .65em;text-align:left;vertical-align:top}.md th{background:#161a20;font-weight:600}
  .md strong{color:#f1f5fb;font-weight:600}.md em{color:#9fb0c6}.md blockquote{border-left:3px solid #167c5b;padding-left:.85em;color:#9fb0c6;margin:.5em 0}
  .md hr{border:0;border-top:1px solid #232a33;margin:.9em 0}
  .diff-add{background:rgba(52,211,153,.12);color:#a7f3d0}.diff-del{background:rgba(251,113,133,.12);color:#fecdd3}
  .fade{animation:f .28s cubic-bezier(.2,.8,.2,1)}@keyframes f{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback,useMemo} = React;
const _mdi = (typeof window!=='undefined') && (window.markdownit || window.markdownIt);
const MD = _mdi ? _mdi({ html:false, linkify:true, breaks:true, typographer:true })
  : { render:(t)=>'<pre style="white-space:pre-wrap">'+String(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))+'</pre>' };
const BLOCKERS = ['patient2','patient5'];
const isBlocker = (f)=> BLOCKERS.includes(String(f||'').toLowerCase());
const cls = (...a)=>a.filter(Boolean).join(' ');
const stripAnsi = (s)=> s.replace(/\x1b\[[0-9;]*m/g,'');
async function jget(u){ const r=await fetch(u); if(r.status===401) throw {unauth:true}; return r.json(); }
async function jpost(u,b){ const r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})}); if(r.status===401&&u!=='/api/login') throw {unauth:true}; return r.json(); }
async function jput(u,b){ const r=await fetch(u,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})}); if(r.status===401) throw {unauth:true}; return r.json(); }
const fmtPct = (v)=> v==null?'—':(v*100).toFixed(1)+'%';
const fmtNum = (v,d=3)=> v==null?'—':Number(v).toFixed(d);
const shortId = (id)=> id.replace(/^run_/,'').replace('_',' ');
const numOf = (name)=>{ const m=String(name).match(/(\d+)/); return m?Number(m[1]):null; };

// split an eval .md into its named sections (Generated / Raw / Gold + head)
function splitNoteMd(md){
  const lines=(md||'').split('\n'); const secs=[]; let cur={title:'_head',body:[]};
  for(const ln of lines){ const m=ln.match(/──\s*(.+?)\s*──/); if(m){ secs.push(cur); cur={title:m[1],body:[]}; } else cur.body.push(ln); }
  secs.push(cur);
  const find=(rx)=>{ const s=secs.find(x=>rx.test(x.title)); return s?s.body.join('\n').trim():''; };
  return { head:secs[0].body.join('\n').trim(), generated:find(/generated/i), raw:find(/raw pipeline|embedded/i), gold:find(/gold/i) };
}

const DEF_TH = { section_coverage:[0.8,0.6], similarity_to_gold:[0.4,0.28], story_flow:[0.85,0.65], omission_rate:[0.45,0.6] };
function loadTh(){ try{return {...DEF_TH,...JSON.parse(localStorage.getItem('notera_th')||'{}')}}catch{return DEF_TH} }
function metricColor(key,v,th){ if(v==null) return 'text-slate-500'; const t=th[key]; if(!t) return 'text-slate-200';
  const inv = key==='omission_rate'; const [g,a]=t;
  if(inv){ if(v<=g) return 'text-good'; if(v<=a) return 'text-warn'; return 'text-danger'; }
  if(v>=g) return 'text-good'; if(v>=a) return 'text-warn'; return 'text-danger'; }

// ── Toasts (global, portal-free) ──────────────────────────────
const _toasts={list:[],subs:new Set(),n:0};
function toast(msg,kind='info'){ const t={id:++_toasts.n,msg,kind}; _toasts.list=[..._toasts.list,t]; _toasts.subs.forEach(f=>f());
  setTimeout(()=>{ _toasts.list=_toasts.list.filter(x=>x.id!==t.id); _toasts.subs.forEach(f=>f()); },2600); }
function Toaster(){ const [,f]=useState(0); useEffect(()=>{ const h=()=>f(n=>n+1); _toasts.subs.add(h); return ()=>_toasts.subs.delete(h); },[]);
  const ico={info:'●',success:'✓',error:'✕',warn:'!'}; const tone={info:'text-info',success:'text-good',error:'text-danger',warn:'text-warn'};
  return <div className="fixed bottom-5 right-5 z-[100] flex flex-col gap-2 pointer-events-none" role="status" aria-live="polite">
    {_toasts.list.map(t=><div key={t.id} className="toastIn pointer-events-auto flex items-center gap-2.5 bg-ink-800/95 border border-line rounded-xl px-3.5 py-2.5 shadow-pop min-w-[240px]">
      <span className={cls('text-sm',tone[t.kind]||tone.info)}>{ico[t.kind]||ico.info}</span><span className="text-sm text-slate-200">{t.msg}</span></div>)}
  </div>; }
// ── Loading + empty states ────────────────────────────────────
function Skeleton({className}){ return <div className={cls('skeleton',className)}/>; }
function EmptyState({icon,title,hint,action}){ return <div className="flex flex-col items-center justify-center text-center py-16 px-6 fade">
  <div className="w-12 h-12 rounded-2xl bg-ink-800 border border-line flex items-center justify-center text-slate-500 text-xl mb-3.5">{icon||'○'}</div>
  <div className="text-slate-200 font-medium text-sm">{title}</div>
  {hint&&<div className="text-slate-500 text-xs mt-1.5 max-w-sm leading-relaxed">{hint}</div>}
  {action&&<div className="mt-4">{action}</div>}
</div>; }
// ── Status primitives ─────────────────────────────────────────
function Pill({status}){
  const map={idle:['Idle','bg-ink-700 text-slate-300','bg-slate-500'],running:['Running','bg-info/15 text-info','bg-info animate-pulse'],passed:['Passed','bg-good/15 text-good','bg-good'],failed:['Failed','bg-danger/15 text-danger','bg-danger'],killed:['Killed','bg-warn/15 text-warn','bg-warn'],error:['Error','bg-danger/15 text-danger','bg-danger'],interrupted:['Interrupted','bg-warn/15 text-warn','bg-warn']};
  const [t,c,dot]=map[status]||map.idle;
  return <span className={cls('inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium',c)}><span className={cls('w-1.5 h-1.5 rounded-full',dot)}/>{t}</span>;
}
function Badge({passed}){ return passed===null? <span className="text-slate-600 text-xs">—</span> :
  <span className={cls('inline-flex items-center px-2 py-0.5 rounded-md text-[11px] font-semibold tracking-wide ring-1', passed?'bg-good/10 text-good ring-good/20':'bg-danger/10 text-danger ring-danger/20')}>{passed?'PASS':'FAIL'}</span>; }
function Md({text}){ return <div className="md" dangerouslySetInnerHTML={{__html:MD.render(text||'')}}/>; }

function Login({onOk}){
  const [pw,setPw]=useState(''); const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const go=async()=>{ if(!pw||busy)return; setBusy(true); setErr(''); try{ const r=await jpost('/api/login',{password:pw}); if(r.ok){toast('Welcome back','success'); onOk();} else setErr('Incorrect password'); }catch{ setErr('Could not reach the server'); } setBusy(false); };
  return <div className="h-screen flex items-center justify-center bg-ink-900 relative overflow-hidden">
    <div className="absolute -top-1/3 left-1/2 -translate-x-1/2 w-[560px] h-[560px] rounded-full blur-3xl pointer-events-none" style={{background:'radial-gradient(circle, rgba(52,211,153,.10), transparent 60%)'}}/>
    <div className="w-[360px] card p-8 relative fade">
      <div className="flex items-center gap-2.5 mb-6">
        <div className="w-9 h-9 rounded-xl bg-phos/15 border border-phos/25 flex items-center justify-center text-phos font-bold text-lg">N</div>
        <div><div className="text-slate-100 font-semibold leading-tight">Notera</div><div className="text-slate-500 text-xs">Auto-Tester console</div></div>
      </div>
      <label className="block text-xs font-medium text-slate-400 mb-1.5">Password</label>
      <input type="password" value={pw} autoFocus onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}
        placeholder="Enter admin password" className="w-full bg-ink-900 border border-line rounded-lg px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-600 outline-none focus:border-phos-dim focus:ring-2 focus:ring-phos/15 transition"/>
      {err&&<div className="text-danger text-xs mt-2 flex items-center gap-1">✕ {err}</div>}
      <button onClick={go} disabled={!pw||busy} className={cls('w-full mt-4 font-semibold rounded-lg py-2.5 text-sm transition',(!pw||busy)?'bg-ink-700 text-slate-500 cursor-not-allowed':'bg-phos text-ink-900 hover:brightness-110 active:brightness-95')}>{busy?'Signing in…':'Sign in'}</button>
      <p className="text-slate-600 text-[11px] text-center mt-5">Internal regression harness · authorized access only</p>
    </div></div>;
}

const NAV=[['overview','Overview','▦'],['run','Run','▶'],['results','Results','☰'],['metrics','Metrics','📈'],['prompts','Prompts','✎'],['judge','Gates & Judge','⚖']];
function Sidebar({tab,setTab,onLogout,collapsed}){
  return <aside className={cls('shrink-0 bg-ink-850 border-r border-line flex flex-col transition-all duration-200', collapsed?'w-16':'w-56')}>
    <div className="h-14 flex items-center gap-2.5 px-4 border-b border-line overflow-hidden whitespace-nowrap">
      <div className="w-8 h-8 rounded-lg bg-phos/15 border border-phos/25 flex items-center justify-center text-phos font-bold shrink-0">N</div>
      {!collapsed&&<div className="leading-tight"><div className="text-slate-100 font-semibold text-sm">Notera</div><div className="text-slate-500 text-[11px]">Auto-Tester</div></div>}
    </div>
    <nav className="flex-1 p-2.5 space-y-0.5" aria-label="Primary">
      {NAV.map(([id,label,ic])=>{
        const active=tab===id;
        return <button key={id} onClick={()=>setTab(id)} title={label} aria-current={active?'page':undefined}
          className={cls('group relative w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium transition',
          active?'bg-ink-750 text-slate-100':'text-slate-400 hover:bg-ink-800 hover:text-slate-200')}>
          {active&&<span className="absolute left-0 top-1.5 bottom-1.5 w-0.5 rounded-full bg-phos"/>}
          <span className={cls('w-4 text-center text-[15px]',active?'opacity-100':'opacity-70 group-hover:opacity-100')}>{ic}</span>{!collapsed&&label}</button>;
      })}
    </nav>
    <button onClick={onLogout} className="m-2.5 px-3 py-2 rounded-lg text-xs text-slate-500 hover:text-slate-300 hover:bg-ink-800 text-left flex items-center gap-2 transition">⎋{!collapsed&&<span>Sign out</span>}</button>
  </aside>;
}

// ── Run tab (preset + range) ──────────────────────────────────
function RunTab({global}){
  const [presets,setPresets]=useState([]); const [mode,setMode]=useState('all');
  const [sel,setSel]=useState(''); const [from,setFrom]=useState(1); const [to,setTo]=useState(5);
  const [runId,setRunId]=useState(null); const [status,setStatus]=useState('idle');
  const [lines,setLines]=useState([]); const [filter,setFilter]=useState('');
  const [history,setHistory]=useState([]); const esRef=useRef(null); const paneRef=useRef(null);
  const fixtures=presets.filter(p=>p.id!=='all').map(p=>p.id);
  const numOf=(f)=>{const m=String(f).match(/(\d+)/);return m?+m[1]:null;};
  const lo=Math.min(from,to), hi=Math.max(from,to);
  const rangeSel=fixtures.filter(f=>{const n=numOf(f);return n!=null&&n>=lo&&n<=hi;});
  const loadHist=useCallback(()=>jget('/api/runs').then(setHistory).catch(()=>{}),[]);
  useEffect(()=>{ jget('/api/scripts').then(d=>{setPresets(d.presets||[]); const f=(d.presets||[]).find(x=>x.id!=='all'); if(f)setSel(f.id);}).catch(()=>{}); loadHist(); },[]);
  useEffect(()=>{ const el=paneRef.current; if(el) el.scrollTop=el.scrollHeight; },[lines]);
  const attach=(id)=>{ setLines([]); if(esRef.current) esRef.current.close();
    const es=new EventSource('/api/runs/'+id+'/stream'); esRef.current=es;
    es.onmessage=(e)=>{ const d=JSON.parse(e.data);
      if(d.type==='line') setLines(L=>[...L,{stream:d.stream,line:stripAnsi(d.line)}]);
      else if(d.type==='status'){ setStatus(d.status); global.setStatus(d.status); if(d.status!=='running'){ es.close(); loadHist(); if(d.status==='passed')toast('Run passed','success'); else if(d.status==='failed'||d.status==='error')toast('Run '+d.status,'error'); } } };
    es.onerror=()=>{ es.close(); };
  };
  const chosen=()=> mode==='all'?[] : mode==='one'?(sel?[sel]:[]) : rangeSel;
  const start=async()=>{ const fx=chosen(); const r=await jpost('/api/runs',{fixtures:fx});
    setRunId(r.runId); setStatus('running'); global.setStatus('running'); attach(r.runId); loadHist(); };
  const stop=async()=>{ if(runId){ await jpost('/api/runs/'+runId+'/kill',{}); } };
  const openHist=(h)=>{ setRunId(h.id); setStatus(h.status); attach(h.id); };
  const download=()=>{ const blob=new Blob([lines.map(l=>l.line).join('\n')],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=(runId||'run')+'.log'; a.click(); };
  const shown=lines.filter(l=>!filter||l.line.toLowerCase().includes(filter.toLowerCase()));
  const Mbtn=(id,label)=><button onClick={()=>setMode(id)} className={cls('px-3 py-1.5 rounded-lg text-sm border',mode===id?'border-phos-dim bg-ink-700 text-slate-100':'border-line bg-ink-800 text-slate-400 hover:text-slate-200')}>{label}</button>;
  const willRun= mode==='all'?fixtures.length:(mode==='one'?(sel?1:0):rangeSel.length);
  return <div className="p-6 fade">
    <div className="flex items-center gap-2 mb-3">{Mbtn('all','All')}{Mbtn('one','Single')}{Mbtn('range','Range')}</div>
    <div className="flex items-center gap-3 mb-4 flex-wrap">
      {mode==='one'&&<select value={sel} onChange={e=>setSel(e.target.value)} className="bg-ink-800 border border-line rounded-lg px-3 py-2 text-sm outline-none focus:border-phos-dim">
        {fixtures.map(f=><option key={f} value={f}>{f}</option>)}</select>}
      {mode==='range'&&<div className="flex items-center gap-2 text-sm text-slate-400">
        <span>Patient</span>
        <input type="number" min="1" value={from} onChange={e=>setFrom(+e.target.value)} className="w-16 bg-ink-800 border border-line rounded-lg px-2 py-2 outline-none focus:border-phos-dim"/>
        <span>to</span>
        <input type="number" min="1" value={to} onChange={e=>setTo(+e.target.value)} className="w-16 bg-ink-800 border border-line rounded-lg px-2 py-2 outline-none focus:border-phos-dim"/>
      </div>}
      {status!=='running'
        ? <button onClick={start} disabled={willRun===0} className={cls('font-semibold px-4 py-2 rounded-lg text-sm',willRun===0?'bg-ink-700 text-slate-500':'bg-phos text-ink-900 hover:brightness-110')}>▶ Run {willRun>0?`(${willRun})`:''}</button>
        : <button onClick={stop} className="bg-danger/90 text-white font-semibold px-4 py-2 rounded-lg text-sm">■ Stop</button>}
      <Pill status={status}/>
      <div className="flex-1"/>
      <input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="filter logs…" className="bg-ink-800 border border-line rounded-lg px-3 py-2 text-sm w-48 outline-none focus:border-phos-dim"/>
      <button onClick={download} className="text-slate-400 hover:text-slate-200 text-sm border border-line rounded-lg px-3 py-2">⭳ Log</button>
    </div>
    {mode==='range'&&<div className="mb-3 text-xs text-slate-500">Will run: {rangeSel.length? rangeSel.join(', ') : <span className="text-warn">no fixtures match Patient {lo}–{hi}</span>}</div>}
    <div ref={paneRef} className="logpane bg-ink-900 border border-line rounded-xl h-[50vh] overflow-auto p-3">
      {shown.length===0 && <div className="text-slate-600 text-sm">No output yet. Choose fixtures and hit Run — stdout streams here live.</div>}
      {shown.map((l,i)=><div key={i} className={cls('whitespace-pre-wrap', l.stream==='err'?'text-danger':'text-slate-300')}>{l.line}</div>)}
    </div>
    <div className="mt-4">
      <div className="text-xs uppercase tracking-wide text-slate-500 mb-2">Recent runs</div>
      <div className="flex gap-2 flex-wrap">
        {history.slice(0,8).map(h=>
          <button key={h.id} onClick={()=>openHist(h)} className={cls('flex items-center gap-2 px-3 py-2 rounded-lg border text-xs',
            runId===h.id?'border-phos-dim bg-ink-700':'border-line bg-ink-800 hover:bg-ink-700')}>
            <Pill status={h.status}/><span className="font-mono text-slate-400">{(h.command||'').replace('node eval/run_eval.mjs','eval').trim()||'eval'}</span>
          </button>)}
        {history.length===0&&<span className="text-slate-600 text-sm">No runs yet.</span>}
      </div>
    </div>
  </div>;
}

// ── Results tab (collapsible selector + 2-pane Generated | Gold) ──
function NotePane({title,tone,md,raw,onClose,closable}){
  return <div className="flex-1 min-w-0 flex flex-col border border-line rounded-xl bg-ink-850 overflow-hidden">
    <div className="flex items-center gap-2 px-3 py-2 border-b border-line">
      <span className={cls('w-2 h-2 rounded-full',tone==='gold'?'bg-warn':'bg-phos')}/>
      <span className="text-sm font-semibold text-slate-200">{title}</span>
      <div className="flex-1"/>
      {closable&&<button onClick={onClose} title="close pane" className="text-slate-500 hover:text-slate-200 text-sm px-1">✕</button>}
    </div>

function computeDiff(a,b){ const A=(a||'').split('\n'),B=(b||'').split('\n'); const n=A.length,m=B.length;
  const dp=Array.from({length:n+1},()=>new Array(m+1).fill(0));
  for(let i=n-1;i>=0;i--)for(let j=m-1;j>=0;j--)dp[i][j]=A[i]===B[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);
  const out=[]; let i=0,j=0;
  while(i<n&&j<m){ if(A[i]===B[j]){out.push({t:' ',line:A[i]});i++;j++;} else if(dp[i+1][j]>=dp[i][j+1]){out.push({t:'-',line:A[i]});i++;} else {out.push({t:'+',line:B[j]});j++;} }
  while(i<n)out.push({t:'-',line:A[i++]}); while(j<m)out.push({t:'+',line:B[j++]});
  return out.filter(d=>d.t!==' '||d.line.trim()); }

// ── Command palette (⌘K) ──────────────────────────────────────
function CommandPalette({open,setOpen,commands}){
  const [q,setQ]=useState(''); const [i,setI]=useState(0); const inputRef=useRef(null); const listRef=useRef(null);
  const filtered=useMemo(()=>{ const s=q.trim().toLowerCase(); return s?commands.filter(c=>c.label.toLowerCase().includes(s)||(c.group||'').toLowerCase().includes(s)):commands; },[q,commands]);
  useEffect(()=>{ if(open){ setQ(''); setI(0); const t=setTimeout(()=>inputRef.current&&inputRef.current.focus(),20); return ()=>clearTimeout(t); } },[open]);
  useEffect(()=>{ setI(0); },[q]);
  const run=(c)=>{ setOpen(false); setTimeout(()=>c.action(),0); };
  const onKey=(e)=>{ if(e.key==='ArrowDown'){e.preventDefault(); setI(x=>Math.min(x+1,filtered.length-1));}
    else if(e.key==='ArrowUp'){e.preventDefault(); setI(x=>Math.max(x-1,0));}
    else if(e.key==='Enter'){e.preventDefault(); if(filtered[i])run(filtered[i]);}
    else if(e.key==='Escape'){e.preventDefault(); setOpen(false);} };
  if(!open) return null;
  let lastGroup=null;
  return <div className="fixed inset-0 z-[90] flex items-start justify-center pt-[14vh] px-4" role="dialog" aria-modal="true" aria-label="Command palette">
    <div className="absolute inset-0 bg-black/55 backdrop-blur-sm" onClick={()=>setOpen(false)}/>
    <div className="relative w-full max-w-xl card shadow-pop overflow-hidden toastIn">
      <div className="flex items-center gap-2.5 px-4 border-b border-line">
        <span className="text-slate-500 text-sm">⌘</span>
        <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} onKeyDown={onKey} placeholder="Type a command or search…"
          className="flex-1 bg-transparent py-3.5 text-sm text-slate-100 placeholder:text-slate-600 outline-none"/>
        <kbd className="text-[10px] text-slate-500 border border-line rounded px-1.5 py-0.5">ESC</kbd>
      </div>
      <div ref={listRef} className="max-h-[22rem] overflow-auto py-2">
        {filtered.length===0 && <div className="px-4 py-10 text-center text-slate-600 text-sm">No commands match "{q}"</div>}
        {filtered.map((c,idx)=>{ const showGroup=c.group&&c.group!==lastGroup; lastGroup=c.group;
          return <React.Fragment key={c.id}>
            {showGroup&&<div className="px-4 pt-2.5 pb-1 text-[10px] uppercase tracking-wide text-slate-600 font-medium">{c.group}</div>}
            <button onMouseMove={()=>setI(idx)} onClick={()=>run(c)}
              className={cls('w-full flex items-center gap-3 px-4 py-2 text-left text-sm rounded-none',idx===i?'bg-ink-750 text-slate-100':'text-slate-300 hover:bg-ink-800')}>
              <span className="w-5 text-center opacity-80">{c.icon}</span><span className="flex-1">{c.label}</span>
              {idx===i&&<span className="text-[10px] text-slate-500">↵</span>}
            </button>
          </React.Fragment>; })}
      </div>
    </div>
  </div>;
}

        <Pill status={status}/><div className="flex-1"/>
        <button onClick={()=>setPaletteOpen(true)} title="Command palette" className="hidden sm:inline-flex items-center gap-2 text-xs text-slate-400 bg-ink-800 border border-line rounded-lg pl-2.5 pr-1.5 py-1.5 hover:text-slate-200 hover:border-ink-600 transition">
          <span>Search</span><kbd className="text-[10px] text-slate-500 bg-ink-900 border border-line rounded px-1 py-0.5 font-mono">⌘K</kbd></button>
        <span className="hidden md:inline text-xs text-slate-600 font-mono">env: local</span>
      </header>
      <main className="flex-1 overflow-auto">
        {tab==='overview'&&<Overview setTab={setTab}/>}
        {tab==='run'&&<RunTab global={{setStatus}}/>}
        {tab==='results'&&<ResultsTab setTab={setTab} target={resultsTarget} clearTarget={()=>setResultsTarget(null)}/>}
        {tab==='metrics'&&<MetricsTab openInResults={openInResults}/>}
        {tab==='prompts'&&<PromptsTab setTab={setTab}/>}
        {tab==='judge'&&<JudgeTab/>}
      </main>
    </div>
    <Toaster/>
    <CommandPalette open={paletteOpen} setOpen={setPaletteOpen} commands={commands}/>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
